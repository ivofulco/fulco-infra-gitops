apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434

        volumeMounts:
        - mountPath: /root/.ollama
          name: ollama-data

        resources:
          requests:
            memory: "8Gi"
            cpu: "2"
          limits:
            memory: "16Gi"
            cpu: "4"

      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-data